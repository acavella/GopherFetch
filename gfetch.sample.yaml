# Sample configuration file for GopherFetch. Copy this file to config.yaml and edit the values as needed.
download_directory: "/var/lib/gfetch"     # Directory where downloaded files will be saved.
worker_limit: 5                       # Controls how many concurrent downloads the program will perform.
run_interval_seconds: 300             # The program will check for downloads every 5 minutes.
files:                                # List of files to download. Each entry should have a URL and a filename.
  - url: "http://e7.c.lencr.org/33.crl"
    filename: "33.crl"
  - url: "http://e7.c.lencr.org/32.crl"
    filename: "32.crl"
  - url: "http://e7.c.lencr.org/31.crl"
    filename: "31.crl"
  - url: "http://e7.c.lencr.org/30.crl"
    filename: "30.crl"